<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Wall Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: linear-gradient(135deg, #1f2937 0%, #111827 100%); color: #e5e7eb; min-height: 100vh; padding: 20px; }
  .wrap { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 26px; margin-bottom: 4px; }
  .sub { color: #9ca3af; margin-bottom: 20px; font-size: 14px; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
  .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 18px; flex: 1; min-width: 320px; }
  .card h2 { font-size: 16px; margin-bottom: 14px; color: #f9fafb; }
  label { display: block; font-size: 13px; color: #9ca3af; margin: 10px 0 4px; }
  select, input[type=text], input[type=number], input[type=file] {
    width: 100%; padding: 9px; background: #111827; border: 1px solid #374151; border-radius: 7px; color: #e5e7eb; font-size: 14px; }
  .btn { padding: 10px 14px; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #374151; color: #e5e7eb; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
  .layouts { display: flex; gap: 6px; flex-wrap: wrap; }
  .lay { padding: 7px 12px; background: #111827; border: 1px solid #374151; border-radius: 7px; cursor: pointer; font-size: 13px; }
  .lay.active { background: #6366f1; border-color: #6366f1; color: white; }
  .grid { display: grid; gap: 4px; margin-top: 12px; background: #000; padding: 4px; border-radius: 8px; }
  .panel { background: #0b1220; border: 1px solid #1f2937; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
           font-size: 12px; color: #6b7280; cursor: pointer; position: relative; }
  .panel.portrait { aspect-ratio: 9/16; }
  .panel.online { border-color: #16a34a; }
  .panel.offline { border-color: #b91c1c; }
  .panel.sel { outline: 2px solid #6366f1; }
  .dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 4px; right: 4px; background: #6b7280; }
  .dot.online { background: #16a34a; } .dot.offline { background: #b91c1c; }
  #preview { width: 100%; margin-top: 12px; border-radius: 8px; display: none; border: 1px solid #374151; }
  .log { font-family: monospace; font-size: 12px; background: #0b1220; border: 1px solid #374151; border-radius: 7px;
         padding: 10px; margin-top: 12px; max-height: 140px; overflow-y: auto; white-space: pre-wrap; color: #93c5fd; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #374151; margin-left: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🧱 Video Wall Hub</h1>
  <div class="sub">Layout <span id="curLayout" class="pill">—</span> Fit <span id="curFit" class="pill">—</span>
    <button class="btn btn-secondary" style="margin:0;padding:4px 10px;float:right" onclick="refresh()">⟳ Refresh nodes</button></div>

  <div class="row">
    <div class="card" style="flex: 1.1">
      <h2>Wall</h2>
      <div class="layouts" id="layouts"></div>
      <label>Fit mode (how the source maps onto the wall)</label>
      <select id="fit" onchange="setFit()">
        <option value="cover">cover — fill wall, crop overflow</option>
        <option value="contain">contain — show whole image, letterbox</option>
        <option value="stretch">stretch — distort to fill</option>
      </select>
      <div class="grid" id="grid"></div>
      <div class="sub" style="margin-top:8px">Green = node online. Click a panel to target it in “solo” mode.</div>
    </div>

    <div class="card">
      <h2>Send Image</h2>
      <label>Image file</label>
      <input type="file" id="imgFile" accept="image/*">
      <label>Mode</label>
      <select id="imgMode">
        <option value="span">span — one image across the whole grid</option>
        <option value="mirror">mirror — same image on every panel</option>
        <option value="solo">solo — one image to the selected panel</option>
      </select>
      <label>Sync lead time (seconds) — flip happens this far in the future</label>
      <input type="number" id="lead" value="0.30" min="0" step="0.05">
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="previewImage()">👁 Preview</button>
        <button class="btn btn-primary" onclick="sendImage()">▶ Send (synced)</button>
      </div>
      <img id="preview">
    </div>
  </div>

  <div class="row" style="margin-top:20px">
    <div class="card">
      <h2>Pre-process Video</h2>
      <div class="sub">Tile a video into per-panel files offline, then play in sync.</div>
      <label>Video file</label>
      <input type="file" id="vidFile" accept="video/*">
      <button class="btn btn-secondary" onclick="prepareVideo()">⚙ Prepare (tile + distribute)</button>
      <div id="vidStatus" class="sub" style="margin-top:8px"></div>
      <label>Loop</label>
      <select id="vidLoop"><option value="0">No</option><option value="1">Yes</option></select>
      <button class="btn btn-primary" onclick="playVideo()">▶ Play (synced)</button>
    </div>

    <div class="card">
      <h2>Control</h2>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="control('stop')">⏸ Stop</button>
        <button class="btn btn-secondary" onclick="control('black')">⬛ Black</button>
        <button class="btn btn-danger" onclick="control('clear')">✕ Clear</button>
      </div>
      <div class="log" id="log">ready.</div>
    </div>
  </div>
</div>

<script>
let S = null;          // server state
let selected = null;   // [row,col] for solo
let nodeStatus = {};

function log(msg) {
  const el = document.getElementById('log');
  el.textContent = (new Date().toLocaleTimeString() + '  ' + msg + '\n' + el.textContent).slice(0, 4000);
}

async function loadState() {
  S = await (await fetch('/api/state')).json();
  document.getElementById('curLayout').textContent = S.layout;
  document.getElementById('curFit').textContent = S.fit;
  document.getElementById('fit').value = S.fit;

  const lays = document.getElementById('layouts');
  lays.innerHTML = S.layouts.map(l =>
    `<div class="lay ${l===S.layout?'active':''}" onclick="setLayout('${l}')">${l}</div>`).join('');

  renderGrid();
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.style.gridTemplateColumns = `repeat(${S.cols}, 1fr)`;
  const portrait = S.orientation === 'portrait';
  let html = '';
  for (let r = 0; r < S.rows; r++) {
    for (let c = 0; c < S.cols; c++) {
      const key = `${r},${c}`;
      const st = nodeStatus[key];
      const cls = st === undefined ? '' : (st ? 'online' : 'offline');
      const dot = st === undefined ? '' : (st ? 'online' : 'offline');
      const sel = (selected && selected[0]===r && selected[1]===c) ? 'sel' : '';
      html += `<div class="panel ${portrait?'portrait':''} ${cls} ${sel}" onclick="selectPanel(${r},${c})">
                 ${key}<span class="dot ${dot}"></span></div>`;
    }
  }
  g.innerHTML = html;
}

function selectPanel(r, c) { selected = [r, c]; renderGrid(); }

async function setLayout(l) {
  await fetch('/api/layout', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({layout: l})});
  selected = null;
  await loadState();
  log('layout -> ' + l);
}

async function setFit() {
  const fit = document.getElementById('fit').value;
  await fetch('/api/layout', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({layout: S.layout, fit})});
  await loadState();
  log('fit -> ' + fit);
}

async function refresh() {
  const r = await (await fetch('/api/nodes/status')).json();
  nodeStatus = {};
  for (const k in r) nodeStatus[k] = r[k].online;
  renderGrid();
  log('node status refreshed');
}

function imageForm() {
  const f = document.getElementById('imgFile').files[0];
  if (!f) { alert('Choose an image first'); return null; }
  const fd = new FormData();
  fd.append('file', f);
  fd.append('mode', document.getElementById('imgMode').value);
  fd.append('lead', document.getElementById('lead').value);
  if (document.getElementById('imgMode').value === 'solo') {
    if (!selected) { alert('Click a panel to target for solo mode'); return null; }
    fd.append('target', selected.join(','));
  }
  return fd;
}

async function previewImage() {
  const fd = imageForm(); if (!fd) return;
  const r = await fetch('/api/image/preview', {method:'POST', body: fd});
  const blob = await r.blob();
  const img = document.getElementById('preview');
  img.src = URL.createObjectURL(blob);
  img.style.display = 'block';
  log('preview rendered');
}

async function sendImage() {
  const fd = imageForm(); if (!fd) return;
  const r = await (await fetch('/api/image/send', {method:'POST', body: fd})).json();
  log('image sent, flip at ' + (r.show_at ? new Date(r.show_at*1000).toLocaleTimeString() : '?'));
}

let lastJob = null;
async function prepareVideo() {
  const f = document.getElementById('vidFile').files[0];
  if (!f) { alert('Choose a video first'); return; }
  const fd = new FormData(); fd.append('file', f);
  const r = await (await fetch('/api/video/prepare', {method:'POST', body: fd})).json();
  lastJob = r.job_id;
  log('video prepare started: ' + lastJob);
  pollJob();
}

async function pollJob() {
  if (!lastJob) return;
  const s = await (await fetch('/api/video/status/' + lastJob)).json();
  document.getElementById('vidStatus').textContent =
    `state: ${s.state} ${s.total ? `(${s.done}/${s.total} tiles)` : ''} ${s.error||''}`;
  if (s.state !== 'ready' && s.state !== 'error') setTimeout(pollJob, 700);
  else log('video ' + s.state);
}

async function playVideo() {
  const loop = document.getElementById('vidLoop').value === '1';
  const r = await (await fetch('/api/video/play', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({loop})})).json();
  log('video play, start at ' + new Date(r.show_at*1000).toLocaleTimeString());
}

async function control(action) {
  await fetch('/api/control/' + action, {method:'POST'});
  log('control: ' + action);
}

loadState().then(refresh);
setInterval(refresh, 15000);
</script>
</body>
</html>
